<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#81D8D0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Crazy Rabbit</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    
    <style>
        :root {
            --bg-primary: #2C3E50; --bg-secondary: #34495E; --bg-card: #243342;
            --bg-sidebar: #1a252f; --text-primary: #FFFFFF; --text-secondary: #BDC3C7;
            --accent: #81D8D0; --accent-hover: #6ECBC3; --border: #4A6274;
            --green: #2ecc71; --red: #e74c3c; --yellow: #f1c40f;
            --cat-liquid: #3498db; --cat-supplies: #e67e22; --cat-pods: #9b59b6;
            --cat-disposable: #e74c3c; --cat-snus: #1abc9c;
        }
        [data-theme="light"] {
            --bg-primary: #F8F9FA; --bg-secondary: #FFFFFF; --bg-card: #E9ECEF;
            --bg-sidebar: #E9ECEF; --text-primary: #2C3E50; --text-secondary: #6C757D;
            --accent: #81D8D0; --accent-hover: #6ECBC3; --border: #DEE2E6;
            --green: #27ae60; --red: #c0392b; --yellow: #d4ac0d;
            --cat-liquid: #2980b9; --cat-supplies: #d35400; --cat-pods: #8e44ad;
            --cat-disposable: #c0392b; --cat-snus: #16a085;
        }
        [data-theme="pink"] {
            --bg-primary: #FFF0F3; --bg-secondary: #FFFFFF; --bg-card: #FFE0E6;
            --bg-sidebar: #FFE0E6; --text-primary: #FF69B4; --text-secondary: #FFB6C1;
            --accent: #FF69B4; --accent-hover: #FF1493; --border: #FFB6C1;
            --green: #00b894; --red: #d63031; --yellow: #fdcb6e;
            --cat-liquid: #74b9ff; --cat-supplies: #fab1a0; --cat-pods: #a29bfe;
            --cat-disposable: #ff7675; --cat-snus: #55efc4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); overflow-x: hidden; transition: all 0.3s ease; }

        .sidebar-overlay { position: fixed; top: 0; left: -100%; width: 100%; height: 100%; z-index: 2000; transition: left 0.3s ease; }
        .sidebar-overlay.active { left: 0; }
        .sidebar-overlay::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.3s ease; }
        .sidebar-overlay.active::before { opacity: 1; }
        .sidebar-content { position: relative; width: 280px; height: 100%; background: var(--bg-sidebar); display: flex; flex-direction: column; z-index: 1; box-shadow: 2px 0 20px rgba(0,0,0,0.3); }
        .sidebar-header { padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .sidebar-header h3 { color: var(--accent); font-weight: 700; font-size: 18px; margin: 0; }
        .btn-close-custom { background: none; border: none; color: var(--text-primary); font-size: 24px; cursor: pointer; padding: 5px; }
        .sidebar-nav { flex: 1; padding: 20px 0; overflow-y: auto; }
        .nav-item { display: flex; align-items: center; padding: 15px 20px; color: var(--text-primary); text-decoration: none; transition: all 0.3s ease; border-left: 4px solid transparent; margin: 5px 0; font-size: 16px; }
        .nav-item i { font-size: 20px; margin-right: 15px; width: 24px; text-align: center; }
        .nav-item.active { background: rgba(129,216,208,0.15); border-left-color: var(--accent); color: var(--accent); font-weight: 600; }
        .sidebar-footer { padding: 20px; border-top: 1px solid var(--border); }
        .theme-indicator { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); font-size: 13px; margin-bottom: 8px; }
        .theme-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; }
        .theme-toggle-btn { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 15px; font-weight: 600; }
        .main-content { padding: 20px 12px 20px; min-height: 100vh; }
        .tab-title { display: inline-block; font-weight: 700; padding-bottom: 10px; border-bottom: 3px solid var(--accent); margin-bottom: 20px; font-size: 22px; cursor: pointer; }

        .stats-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 10px; }
        .period-buttons { display: flex; gap: 4px; background: var(--bg-card); border-radius: 12px; padding: 4px; }
        .period-btn { width: 36px; height: 36px; border: none; background: transparent; color: var(--text-secondary); border-radius: 10px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
        .period-btn.active { background: var(--accent); color: white; }
        .stats-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--bg-card); border-radius: 15px; padding: 15px 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stat-card .stat-icon { font-size: 24px; color: var(--accent); margin-bottom: 8px; }
        .stat-card .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; text-transform: uppercase; }
        .stat-card .stat-value { font-size: 20px; font-weight: 700; margin-bottom: 5px; }
        .stat-card .stat-percent { font-size: 14px; font-weight: 600; }
        .stat-card .stat-percent.positive { color: var(--green); } .stat-card .stat-percent.negative { color: var(--red); }
        .summary-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .summary-item { flex: 1; background: var(--bg-card); border-radius: 15px; padding: 12px 10px; text-align: center; cursor: pointer; }
        .summary-item:active { transform: scale(0.96); }
        .summary-item .summary-icon { font-size: 20px; margin-bottom: 6px; }
        .summary-item .summary-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .summary-item .summary-value { font-size: 16px; font-weight: 700; }
        .summary-item .summary-percent { font-size: 11px; font-weight: 600; margin-top: 2px; }
        .summary-item.booking, .summary-item.booking .summary-icon, .summary-item.booking .summary-label, .summary-item.booking .summary-value { color: var(--green); }
        .summary-item.debt, .summary-item.debt .summary-icon, .summary-item.debt .summary-label, .summary-item.debt .summary-value { color: var(--red); }
        .summary-item.new-clients .summary-icon, .summary-item.new-clients .summary-label, .summary-item.new-clients .summary-value { color: var(--accent); }
        .summary-item.leaving-clients .summary-icon, .summary-item.leaving-clients .summary-label, .summary-item.leaving-clients .summary-value { color: var(--accent); }
        .chart-block { background: var(--bg-card); border-radius: 15px; padding: 20px 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .chart-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .chart-title i { color: var(--accent); }
        .chart-switch { display: flex; background: var(--bg-primary); border-radius: 8px; padding: 2px; gap: 2px; }
        .switch-btn { padding: 6px 12px; border: none; background: transparent; color: var(--text-secondary); border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
        .switch-btn.active { background: var(--accent); color: white; }
        .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 160px; padding-bottom: 30px; overflow-x: auto; }
        .bar-column { display: flex; flex-direction: column; align-items: center; min-width: 30px; flex-shrink: 0; position: relative; height: 100%; justify-content: flex-end; }
        .bar-value { font-size: 10px; color: var(--text-secondary); margin-bottom: 4px; font-weight: 600; }
        .bar-fill-wrap { flex: 1; width: 24px; display: flex; align-items: flex-end; }
        .bar-fill-inner { width: 100%; background: var(--accent); border-radius: 6px 6px 0 0; min-height: 4px; }
        .bar-fill-inner.animate { height: 0 !important; transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .bar-fill-inner.animate.started { height: var(--target-height) !important; }
        .bar-label { font-size: 10px; color: var(--text-secondary); margin-top: 8px; white-space: nowrap; }
        .category-chart { display: flex; align-items: flex-end; gap: 12px; height: 160px; padding-bottom: 30px; }
        .category-column { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
        .category-value { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; font-weight: 600; }
        .category-fill-wrap { flex: 1; width: 100%; max-width: 50px; display: flex; align-items: flex-end; }
        .category-fill-inner { width: 100%; border-radius: 8px 8px 0 0; min-height: 4px; }
        .category-fill-inner.animate { height: 0 !important; transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .category-fill-inner.animate.started { height: var(--target-height) !important; }
        .category-label { font-size: 10px; color: var(--text-secondary); margin-top: 8px; text-align: center; }
        .cat-liquid .category-fill-inner { background: var(--cat-liquid); } .cat-supplies .category-fill-inner { background: var(--cat-supplies); }
        .cat-pods .category-fill-inner { background: var(--cat-pods); } .cat-disposable .category-fill-inner { background: var(--cat-disposable); } .cat-snus .category-fill-inner { background: var(--cat-snus); }
        .date-range { display: flex; gap: 8px; align-items: center; margin-top: 12px; padding: 10px; background: var(--bg-card); border-radius: 12px; }
        .date-input { flex: 1; padding: 8px 10px; border: 2px solid var(--border); border-radius: 10px; background: var(--bg-primary); color: var(--text-primary); font-size: 13px; outline: none; }
        .date-input:focus { border-color: var(--accent); }
        .date-separator { color: var(--text-secondary); font-size: 14px; }

        .warehouse-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 10px; }
        @media (min-width: 500px) { .warehouse-cards { grid-template-columns: repeat(3, 1fr); } }
        .wh-card { background: var(--bg-card); border-radius: 15px; padding: 15px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .wh-card:active { transform: scale(0.97); }
        .wh-card .wh-icon { font-size: 28px; margin-bottom: 8px; }
        .wh-card .wh-label { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
        .wh-card .wh-count { font-size: 12px; color: var(--text-secondary); }
        .wh-card.liquid { border-left: 4px solid var(--cat-liquid); } .wh-card.liquid .wh-icon { color: var(--cat-liquid); }
        .wh-card.supplies { border-left: 4px solid var(--cat-supplies); } .wh-card.supplies .wh-icon { color: var(--cat-supplies); }
        .wh-card.pods { border-left: 4px solid var(--cat-pods); } .wh-card.pods .wh-icon { color: var(--cat-pods); }
        .wh-card.disposable { border-left: 4px solid var(--cat-disposable); } .wh-card.disposable .wh-icon { color: var(--cat-disposable); }
        .wh-card.snus { border-left: 4px solid var(--cat-snus); } .wh-card.snus .wh-icon { color: var(--cat-snus); }

        .warehouse-table-section { background: var(--bg-card); border-radius: 15px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .wh-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .wh-back-btn { background: none; border: none; color: var(--accent); font-size: 20px; cursor: pointer; padding: 5px; }
        .wh-category-title { font-size: 16px; font-weight: 700; }
        .wh-add-btn { background: var(--accent); color: white; border: none; width: 36px; height: 36px; border-radius: 10px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .wh-delete-selected-btn { background: var(--red); color: white; border: none; height: 36px; padding: 0 12px; border-radius: 10px; font-size: 14px; cursor: pointer; display: none; align-items: center; gap: 6px; font-weight: 600; }
        .wh-delete-selected-btn.visible { display: flex; }
        .wh-cancel-select-btn { background: var(--border); color: var(--text-primary); border: none; height: 36px; padding: 0 12px; border-radius: 10px; font-size: 14px; cursor: pointer; display: none; align-items: center; gap: 6px; }
        .wh-cancel-select-btn.visible { display: flex; }
        .search-input { width: 100%; padding: 12px 15px; border: 2px solid var(--border); border-radius: 12px; background: var(--bg-primary); color: var(--text-primary); font-size: 14px; outline: none; margin-bottom: 15px; }
        .search-input:focus { border-color: var(--accent); }

        .accordion-group { margin-bottom: 8px; }
        .accordion-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 15px; background: var(--bg-primary); border-radius: 10px;
            font-weight: 600; font-size: 14px; min-height: 48px;
            cursor: default;
        }
        .accordion-header-left {
            display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0;
            cursor: pointer; line-height: 1.2;
        }
        .accordion-header-actions {
            display: flex; align-items: center; gap: 8px; flex-shrink: 0;
        }
        .accordion-header .accordion-arrow {
            transition: transform 0.3s ease; font-size: 13px; cursor: pointer;
            display: flex; align-items: center;
        }
        .accordion-header.open .accordion-arrow { transform: rotate(180deg); }
        .accordion-body { display: none; padding: 5px 0; }
        .accordion-body.open { display: block; }
        .accordion-body .accordion-header { padding-left: 28px; }

        .group-edit-btn {
            background: none; border: none; color: var(--accent); cursor: pointer;
            font-size: 16px; padding: 2px 6px; transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 10; line-height: 1;
        }
        .group-edit-btn:active { transform: scale(1.15); color: var(--accent-hover); }

        .product-row-wrapper { position: relative; overflow: hidden; }
        .product-row { 
            display: flex; align-items: center; padding: 10px 15px 10px 25px; 
            border-bottom: 1px solid var(--border); cursor: pointer; font-size: 13px; gap: 6px; 
            transition: transform 0.2s ease, filter 0.1s ease; 
            position: relative; z-index: 1; background: var(--bg-card); 
        }
        /* НОВОЕ: при обычном нажатии — светлее на 10% */
        .product-row.pressing { filter: brightness(1.1); }
        .product-row:active { filter: brightness(1.1); }
        .product-row.selected { filter: brightness(1.15); background: var(--bg-card); }
        .swipe-delete-bg { 
            position: absolute; top: 0; right: 0; height: 100%; 
            background: var(--red); z-index: 0; width: 100%; 
        }
        /* Иконка корзины при свайпе */
        .swipe-delete-icon {
            position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
            color: white; font-size: 22px; z-index: 0; opacity: 0;
            pointer-events: none; transition: opacity 0.2s ease;
        }
        .product-col { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .product-col.price { text-align: right; flex: 0.7; }
        .product-col.qty { text-align: center; flex: 0.5; }
        .product-col.copy-btn { flex: 0 0 30px; text-align: center; cursor: pointer; color: var(--accent); font-size: 16px; }
        .table-header-row { display: flex; padding: 8px 15px 8px 25px; font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; gap: 6px; }
        .table-header-row .product-col { font-weight: 600; }
        .checkbox-col { flex: 0 0 24px; display: none; align-items: center; }
        .checkbox-col.visible { display: flex; }
        .select-checkbox { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }

        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 70% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
        .product-row.pop-anim { animation: popIn 0.4s ease; }

        .skeleton { background: linear-gradient(90deg, var(--bg-card) 25%, var(--border) 50%, var(--bg-card) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .skeleton-chart { height: 160px; margin-bottom: 15px; }
        .skeleton-card { height: 80px; margin-bottom: 10px; }
        .skeleton-row { height: 40px; margin-bottom: 5px; }

        .sales-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; flex-wrap: wrap; }
        .sales-header-left { display: flex; gap: 8px; align-items: center; }
        .sales-header-btn { background: var(--accent); color: white; border: none; padding: 10px 16px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .sales-header-btn:active { transform: scale(0.96); }
        .sales-header-btn.filter { background: var(--border); color: var(--text-primary); }
        .sales-header-btn.filter.active { background: var(--accent); color: white; }
        .sales-table-section { background: var(--bg-card); border-radius: 15px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .sale-row-wrapper { position: relative; overflow: hidden; margin-bottom: 2px; }
        .sale-row { 
            display: flex; align-items: center; padding: 12px 15px; cursor: pointer; font-size: 13px; gap: 6px; 
            transition: transform 0.2s ease, filter 0.1s ease; 
            position: relative; z-index: 1; background: var(--bg-card); border-radius: 8px; 
            border: 2px solid transparent; 
        }
        .sale-row.pressing { filter: brightness(1.1); }
        .sale-row:active { filter: brightness(1.1); }
        .sale-row.selected { filter: brightness(1.15); background: var(--bg-card); }
        .sale-row.booking { border-color: var(--green); }
        .sale-row.debt { border-color: var(--red); }
        .sale-row.prize { border-color: var(--yellow); }
        .sale-col { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sale-col.price { text-align: right; }
        .sale-col.qty { text-align: center; flex: 0.5; }
        .sales-delete-bg { position: absolute; top: 0; right: 0; height: 100%; background: var(--red); z-index: 0; width: 100%; border-radius: 8px; }
        .sale-table-header { display: flex; padding: 8px 15px; font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; gap: 6px; font-weight: 600; }
        .sale-checkbox-col { flex: 0 0 24px; display: none; align-items: center; }
        .sale-checkbox-col.visible { display: flex; }

        .clients-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; }
        .clients-header-left { display: flex; gap: 8px; align-items: center; }
        .clients-table-section { background: var(--bg-card); border-radius: 15px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .client-row { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 13px; gap: 6px; background: var(--bg-card); cursor: pointer; transition: opacity 0.2s ease; }
        .client-row:last-child { border-bottom: none; }
        .client-row:active { filter: brightness(1.1); }
        .client-row.leaving { opacity: 0.5; }
        .client-col { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .client-col.price { text-align: right; }
        .client-col.prize-progress { flex: 0.8; text-align: center; }
        .prize-bar { display: inline-block; height: 6px; border-radius: 3px; background: var(--border); width: 60px; vertical-align: middle; margin-right: 6px; }
        .prize-bar-fill { height: 100%; border-radius: 3px; background: var(--cat-liquid); transition: width 0.3s ease; }
        .prize-text { font-size: 11px; color: var(--text-secondary); vertical-align: middle; }
        .prize-complete { color: var(--green); font-weight: 700; }
        .client-table-header { display: flex; padding: 8px 15px; font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; gap: 6px; font-weight: 600; }

        .pagination { display: flex; justify-content: center; align-items: center; gap: 6px; margin-top: 15px; }
        .pagination button { background: var(--bg-primary); color: var(--text-primary); border: 2px solid var(--border); width: 36px; height: 36px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; }
        .pagination button:active { transform: scale(0.93); }
        .pagination button.active { background: var(--accent); border-color: var(--accent); color: white; }
        .pagination button:disabled { opacity: 0.3; pointer-events: none; }
        .pagination .page-info { font-size: 13px; color: var(--text-secondary); padding: 0 8px; }

        .combo-box { position: relative; }
        .combo-box .form-input { width: 100%; padding-right: 40px; }
        .combo-box .combo-arrow { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text-secondary); font-size: 12px; }
        .combo-dropdown { position: absolute; top: 100%; left: 0; right: 0; max-height: 200px; overflow-y: auto; background: var(--bg-primary); border: 2px solid var(--accent); border-top: none; border-radius: 0 0 10px 10px; z-index: 100; display: none; }
        .combo-dropdown.open { display: block; }
        .combo-option { padding: 12px 15px; cursor: pointer; font-size: 14px; border-bottom: 1px solid var(--border); transition: background 0.2s ease; }
        .combo-option:last-child { border-bottom: none; }
        .combo-option:hover, .combo-option.active { background: rgba(129,216,208,0.15); color: var(--accent); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.2s ease; }
        .modal-dialog-custom { background: var(--bg-secondary); border-radius: 20px; width: 90%; max-width: 420px; max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.3); animation: scaleIn 0.2s ease; }
        .modal-header-custom { padding: 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-secondary); z-index: 1; border-radius: 20px 20px 0 0; }
        .modal-body-custom { padding: 20px; }
        .modal-footer-custom { padding: 15px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; position: sticky; bottom: 0; background: var(--bg-secondary); border-radius: 0 0 20px 20px; }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: var(--text-secondary); }
        .form-input, .form-select { width: 100%; padding: 12px 15px; border: 2px solid var(--border); border-radius: 10px; background: var(--bg-primary); color: var(--text-primary); font-size: 15px; outline: none; appearance: none; }
        .form-input:focus, .form-select:focus { border-color: var(--accent); }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
        .btn-save { background: var(--accent); color: white; }
        .btn-cancel { background: var(--border); color: var(--text-primary); }
        .btn-delete { background: var(--red); color: white; flex: 0.5; }
        .btn-reset { background: transparent; color: var(--text-secondary); border: 2px solid var(--border); }
        .btn:active { transform: scale(0.96); }

        .snackbar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--bg-sidebar); color: white; padding: 14px 24px; border-radius: 25px; z-index: 9999; font-size: 14px; font-weight: 600; box-shadow: 0 4px 20px rgba(0,0,0,0.4); display: flex; align-items: center; gap: 12px; animation: slideUp 0.3s ease; }
        .snackbar .snackbar-undo { background: var(--accent); border: none; color: white; padding: 6px 14px; border-radius: 15px; cursor: pointer; font-weight: 700; font-size: 13px; }
        @keyframes slideUp { from { transform: translateX(-50%) translateY(100px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .content-body { }
        .content-body.fade-in { animation: fadeInUp 0.35s ease; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; display: inline-block; }

        .warehouse-table-section, .warehouse-table-section *, .product-row, .product-row *, .accordion-header, .accordion-header *, .table-header-row, .table-header-row *, .product-row-wrapper, .product-row-wrapper *, .sales-table-section, .sales-table-section *, .sale-row, .sale-row *, .sale-row-wrapper, .sale-row-wrapper *, .sale-table-header, .sale-table-header *, .clients-table-section, .clients-table-section *, .client-row, .client-row *, .client-table-header, .client-table-header * {
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; -webkit-touch-callout: none;
        }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebar" onclick="closeSidebarOutside(event)">
        <div class="sidebar-content" onclick="event.stopPropagation()">
            <div class="sidebar-header"><h3>Crazy Rabbit</h3><button class="btn-close-custom" onclick="closeSidebar()"><i class="bi bi-x-lg"></i></button></div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item" onclick="switchTab('statistics')" data-tab="statistics"><i class="bi bi-graph-up-arrow"></i>Статистика</a>
                <a href="#" class="nav-item" onclick="switchTab('warehouse')" data-tab="warehouse"><i class="bi bi-box-seam"></i>Склад</a>
                <a href="#" class="nav-item" onclick="switchTab('sales')" data-tab="sales"><i class="bi bi-cart3"></i>Продажи</a>
                <a href="#" class="nav-item active" onclick="switchTab('clients')" data-tab="clients"><i class="bi bi-people"></i>Клиенты</a>
            </nav>
            <div class="sidebar-footer"><div class="theme-indicator"><span class="theme-dot"></span><span id="themeName">Тёмная тема</span></div><button class="theme-toggle-btn" onclick="toggleTheme()"><i class="bi bi-palette"></i> Сменить тему</button></div>
        </div>
    </div>
    <main class="main-content" id="mainContent"><div class="content-body" id="contentBody"></div></main>
    <div id="modalContainer"></div>
    <div id="snackbarContainer"></div>

    <script>
        const DB_NAME = 'CrazyRabbitDB'; const DB_VERSION = 41;
        class Database {
            constructor() { this.db = null; }
            async init() {
                return new Promise((resolve, reject) => {
                    const r = indexedDB.open(DB_NAME, DB_VERSION);
                    r.onerror = () => reject(r.error);
                    r.onsuccess = () => { this.db = r.result; resolve(); };
                    r.onupgradeneeded = (e) => {
                        const d = e.target.result;
                        if (!d.objectStoreNames.contains('settings')) d.createObjectStore('settings', { keyPath: 'key' });
                        if (!d.objectStoreNames.contains('sales')) { const s = d.createObjectStore('sales', { keyPath: 'id', autoIncrement: true }); s.createIndex('date', 'date', { unique: false }); s.createIndex('client', 'client', { unique: false }); }
                        if (!d.objectStoreNames.contains('products')) { const p = d.createObjectStore('products', { keyPath: 'id', autoIncrement: true }); p.createIndex('category', 'category', { unique: false }); }
                        if (!d.objectStoreNames.contains('clients')) { const c = d.createObjectStore('clients', { keyPath: 'id', autoIncrement: true }); c.createIndex('name', 'name', { unique: false }); }
                    };
                });
            }
            async g(s, k) { return this.p(this.db.transaction([s],'readonly').objectStore(s).get(k)); }
            async pu(s, d) { return this.p(this.db.transaction([s],'readwrite').objectStore(s).put(d)); }
            async all(s) { return this.p(this.db.transaction([s],'readonly').objectStore(s).getAll()); }
            async add(s, d) { return this.p(this.db.transaction([s],'readwrite').objectStore(s).add(d)); }
            async del(s, id) { return this.p(this.db.transaction([s],'readwrite').objectStore(s).delete(id)); }
            p(r) { return new Promise((rs, rj) => { r.onsuccess = () => rs(r.result); r.onerror = () => rj(r.error); }); }
        }
        const db = new Database();

        const CATEGORIES = ['liquid','supplies','pods','disposable','snus'];
        const CATEGORY_NAMES = {'liquid':'Жидкости','supplies':'Расходники','pods':'Поды','disposable':'Одноразки','snus':'Снюс'};
        const CATEGORY_ICONS = {'liquid':'bi-droplet','supplies':'bi-tools','pods':'bi-usb-plug','disposable':'bi-phone','snus':'bi-box2'};
        const CATEGORY_CLASS = {'liquid':'liquid','supplies':'supplies','pods':'pods','disposable':'disposable','snus':'snus'};
        const CATEGORY_EXTRA_FIELDS = {'liquid':[{key:'flavor',label:'Вкус'}],'supplies':[],'pods':[{key:'color',label:'Цвет'}],'disposable':[{key:'flavor',label:'Вкус'}],'snus':[{key:'flavor',label:'Вкус'}]};
        const CATEGORY_TABLE_COLS = {'liquid':['flavor','quantity','purchase','selling'],'supplies':['lineup','quantity','purchase','selling'],'pods':['color','quantity','purchase','selling'],'disposable':['flavor','quantity','purchase','selling'],'snus':['flavor','quantity','purchase','selling']};
        const COL_LABELS = {'manufacturer':'Производитель','lineup':'Линейка','flavor':'Вкус','color':'Цвет','quantity':'Кол-во','purchase':'Закупка','selling':'Продажа'};
        const CATEGORY_GROUPS = {'liquid':['manufacturer','lineup'],'supplies':['manufacturer'],'pods':['manufacturer','lineup'],'disposable':['manufacturer','lineup'],'snus':['manufacturer','lineup']};
        function norm(s) { return (s||'').trim().toUpperCase(); }

        const themes = ['dark','light','pink'];
        const themeNames = {'dark':'Тёмная тема','light':'Светлая тема','pink':'Розовая тема'};
        let cti = 0;
        async function toggleTheme() { cti = (cti+1)%themes.length; document.documentElement.setAttribute('data-theme',themes[cti]); document.getElementById('themeName').textContent=themeNames[themes[cti]]; try{await db.pu('settings',{key:'theme',value:themes[cti]});}catch(e){} }
        async function loadTheme() { try{const s=await db.g('settings','theme');if(s){document.documentElement.setAttribute('data-theme',s.value);cti=themes.indexOf(s.value);document.getElementById('themeName').textContent=themeNames[s.value];}}catch(e){} }

        function openSidebar() { document.getElementById('sidebar').classList.add('active'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('active'); }
        function closeSidebarOutside(e) { if(e.target===document.getElementById('sidebar'))closeSidebar(); }

        function fn(n) { if(!n&&n!==0)return'0';return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,' '); }
        function fp(p) { if(p===null||p===undefined)return null;return`${p>=0?'+':''}${p.toFixed(1)}%`; }
        function fmtDate(d) { if(!d||d==='-')return'-';const p=d.split('-');if(p.length!==3)return d;return`${p[2]}.${p[1]}.${p[0].slice(2)}`; }

        function showModal(title,icon,color,body,footer) {
            document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="closeModal(event)"><div class="modal-dialog-custom" onclick="event.stopPropagation()"><div class="modal-header-custom"><i class="${icon}" style="color:${color};font-size:22px;"></i><h3 style="color:${color};font-size:18px;font-weight:700;margin:0;">${title}</h3></div><div class="modal-body-custom">${body}</div>${footer?`<div class="modal-footer-custom">${footer}</div>`:''}</div></div>`;
        }
        function closeModal(event) { if(!event||event.target.classList.contains('modal-overlay'))document.getElementById('modalContainer').innerHTML=''; }
        function showSnackbar(message, undoCallback) {
            const container = document.getElementById('snackbarContainer');
            const id = 'snack_' + Date.now();
            container.innerHTML = `<div class="snackbar" id="${id}">${message} ${undoCallback ? '<button class="snackbar-undo" onclick="window.snackbarUndo(\''+id+'\')">Отменить</button>' : ''}</div>`;
            window.snackbarUndo = function(sid) { if (sid === id && undoCallback) undoCallback(); document.getElementById(sid)?.remove(); };
            setTimeout(() => { const el = document.getElementById(id); if (el) el.remove(); }, 3000);
        }

        function vibrate(pattern) { if (navigator.vibrate) { try { navigator.vibrate(pattern); } catch(e) {} } }

        function showSkeleton(type) {
            if (type === 'statistics') {
                return `<h2 class="tab-title">Статистика</h2>
                <div class="stats-cards"><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div></div>
                <div class="summary-row"><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div></div>
                <div class="skeleton skeleton-chart"></div><div class="skeleton skeleton-chart"></div>`;
            }
            if (type === 'warehouse') {
                return `<h2 class="tab-title">Склад</h2><div class="warehouse-cards">${[...Array(5)].map(()=>'<div class="skeleton skeleton-card"></div>').join('')}</div>`;
            }
            if (type === 'sales' || type === 'clients') {
                return `<h2 class="tab-title">${type==='sales'?'Продажи':'Клиенты'}</h2><div class="skeleton skeleton-row"></div><div class="skeleton skeleton-row"></div><div class="skeleton skeleton-row"></div><div class="skeleton skeleton-row"></div><div class="skeleton skeleton-row"></div>`;
            }
            return '';
        }

        document.addEventListener('selectstart', function(e) { if (e.target.closest('.warehouse-table-section')||e.target.closest('.sales-table-section')||e.target.closest('.clients-table-section')) { e.preventDefault(); } });

        async function findProductByName(productName) {
            const products = await db.all('products');
            return products.find(p => {
                const name = (p.manufacturer + ' ' + p.lineup + (p.flavor ? ' ' + p.flavor : '') + (p.color ? ' ' + p.color : '')).trim();
                return name === productName || norm(name) === norm(productName);
            });
        }

        async function autoAddClient(clientName) {
            const clients = await db.all('clients');
            const exists = clients.some(c => norm(c.name) === norm(clientName));
            if (!exists && clientName.trim()) {
                await db.add('clients', { name: clientName.trim(), created: new Date().toISOString().split('T')[0] });
            }
        }

        function animateValue(element, start, end, duration, suffix) {
            if (start === end) { element.textContent = fn(end) + suffix; return; }
            const startTime = performance.now();
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                const current = Math.round(start + (end - start) * eased);
                element.textContent = fn(current) + suffix;
                if (progress < 1) requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }

        // ============ СТАТИСТИКА ============
        let cp='today',ccm='sum',csd=null,ced=null;
        let prevStats={revenue:0,profit:0,count:0,bookingSum:0,debtSum:0,newClients:0,leavingClients:0};
        function getDateRange(p){const n=new Date(),t=n.toISOString().split('T')[0],y=new Date(n-86400000).toISOString().split('T')[0];let s,e,ps,pe;switch(p){case'today':s=t;e=t;ps=y;pe=y;break;case'week':{const d=n.getDay(),m=new Date(n);m.setDate(n.getDate()-(d===0?6:d-1));s=m.toISOString().split('T')[0];e=t;const pm=new Date(m);pm.setDate(m.getDate()-7);const psu=new Date(m);psu.setDate(m.getDate()-1);ps=pm.toISOString().split('T')[0];pe=psu.toISOString().split('T')[0];break;}case'month':s=new Date(n.getFullYear(),n.getMonth(),1).toISOString().split('T')[0];e=t;const pm=new Date(n.getFullYear(),n.getMonth()-1,1),pme=new Date(n.getFullYear(),n.getMonth(),0);ps=pm.toISOString().split('T')[0];pe=pme.toISOString().split('T')[0];break;case'all':s='2020-01-01';e=t;ps=null;pe=null;break;case'custom':s=csd||t;e=ced||t;ps=null;pe=null;break;}return{s,e,ps,pe};}
        async function getSalesInRange2(s,e){const a=await db.all('sales');return a.filter(x=>x.date>=s&&x.date<=e);}
        function gdd(s,e){return Math.ceil((new Date(e)-new Date(s))/86400000)+1;}
        function getDailyData(sales,s,e){const sm=gdd(s,e)>31,m=new Map();sales.forEach(x=>{const d=new Date(x.date);let k;if(sm){k=`${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear().toString().slice(2)}`;}else{k=`${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}`;}m.set(k,(m.get(k)||0)+(x.profit||0));});return[...m.keys()].sort((a,b)=>{const[pa,pb]=[a.split('.'),b.split('.')];if(sm){return(pa[1]+pa[0]).localeCompare(pb[1]+pb[0]);}else{return(pa[1]+pa[0]).localeCompare(pb[1]+pb[0]);}}).map(k=>({label:k,value:m.get(k)}));}
        function getCategoryData(sales,mode){const map={};CATEGORIES.forEach(c=>map[c]=0);sales.forEach(x=>{const cat=x.category||'liquid';if(map[cat]!==undefined){map[cat]+=(mode==='sum'?(x.profit||0):1);}});return CATEGORIES.map(c=>({category:c,name:CATEGORY_NAMES[c],value:map[c]||0}));}
        function ssd(p,s,e){if(p==='today')return false;if(p==='custom')return gdd(s,e)>=2;return true;}

        async function renderStatistics(period){
            const prevRev=prevStats.revenue,prevProf=prevStats.profit,prevCnt=prevStats.count;
            const prevBooking=prevStats.bookingSum,prevDebt=prevStats.debtSum;
            const prevNew=prevStats.newClients,prevLeaving=prevStats.leavingClients;
            cp=period;const{s,e,ps,pe}=getDateRange(period);const sales=await getSalesInRange2(s,e),prevSales=(ps&&pe)?await getSalesInRange2(ps,pe):[];
            const rev=sales.reduce((s,x)=>s+(x.total||0),0),prof=sales.reduce((s,x)=>s+(x.profit||0),0),cnt=sales.length;
            const pRev=prevSales.reduce((s,x)=>s+(x.total||0),0),pProf=prevSales.reduce((s,x)=>s+(x.profit||0),0),pCnt=prevSales.length;
            const allSalesAllTime=await db.all('sales');
            const bookingSum=allSalesAllTime.filter(s=>s.note==='бронь').reduce((s,x)=>s+(x.total||0),0);
            const debtSum=allSalesAllTime.filter(s=>s.note==='долг').reduce((s,x)=>s+(x.total||0),0);
            const allClients=await db.all('clients');
            const newClients=allClients.filter(c=>c.created>=s&&c.created<=e).length;
            const leavingClients=allClients.filter(c=>{const cs=allSalesAllTime.filter(x=>norm(x.client)===norm(c.name));if(cs.length===0)return false;const last=cs.sort((a,b)=>b.date.localeCompare(a.date))[0];return last&&(new Date()-new Date(last.date))/86400000>30;}).length;
            prevStats={revenue:rev,profit:prof,count:cnt,bookingSum,debtSum,newClients,leavingClients};
            const sd=ssd(period,s,e);const dd=sd?getDailyData(sales,s,e):[],cd=getCategoryData(sales,ccm);
            const md=Math.max(...dd.map(d=>d.value),1),mc=Math.max(...cd.map(d=>d.value),1);
            const showMonths=period==='all'||(period==='custom'&&gdd(s,e)>31);
            const dailyTitle=showMonths?'Прибыль по месяцам':'Прибыль по дням';

            document.getElementById('contentBody').innerHTML=`<h2 class="tab-title" onclick="openSidebar()">Статистика</h2><div class="stats-header"><div class="period-buttons">${['today','week','month','all','custom'].map(p=>`<button class="period-btn ${period===p?'active':''}" onclick="renderStatistics('${p}')"><i class="bi ${p==='today'?'bi-calendar-day':p==='week'?'bi-calendar-week':p==='month'?'bi-calendar-month':p==='all'?'bi-infinity':'bi-calendar-range'}"></i></button>`).join('')}</div></div>
            <div class="stats-cards"><div class="stat-card"><div class="stat-icon"><i class="bi bi-cash-stack"></i></div><div class="stat-label">Выручка</div><div class="stat-value" id="stat_revenue">${fn(prevRev)}₽</div>${period!=='all'&&pRev?`<div class="stat-percent ${rev>=pRev?'positive':'negative'}" id="stat_rev_pct">${fp((rev-pRev)/pRev*100)}</div>`:''}</div><div class="stat-card"><div class="stat-icon"><i class="bi bi-graph-up"></i></div><div class="stat-label">Прибыль</div><div class="stat-value" id="stat_profit">${fn(prevProf)}₽</div>${period!=='all'&&pProf?`<div class="stat-percent ${prof>=pProf?'positive':'negative'}" id="stat_prof_pct">${fp((prof-pProf)/pProf*100)}</div>`:''}</div><div class="stat-card"><div class="stat-icon"><i class="bi bi-cart-check"></i></div><div class="stat-label">Продажи</div><div class="stat-value" id="stat_count">${fn(prevCnt)}</div>${period!=='all'&&pCnt?`<div class="stat-percent ${cnt>=pCnt?'positive':'negative'}" id="stat_cnt_pct">${fp((cnt-pCnt)/pCnt*100)}</div>`:''}</div></div>
            <div class="summary-row">
                <div class="summary-item booking" onclick="showBookingModal()"><div class="summary-icon"><i class="bi bi-calendar-check"></i></div><div class="summary-label">Бронь</div><div class="summary-value" id="sum_booking">${fn(prevBooking)}₽</div></div>
                <div class="summary-item debt" onclick="showDebtModal()"><div class="summary-icon"><i class="bi bi-cash-coin"></i></div><div class="summary-label">Долг</div><div class="summary-value" id="sum_debt">${fn(prevDebt)}₽</div></div>
                <div class="summary-item new-clients" onclick="showNewClientsModal()"><div class="summary-icon"><i class="bi bi-person-plus"></i></div><div class="summary-label">Новые</div><div class="summary-value" id="sum_new">${prevNew} чел.</div></div>
                <div class="summary-item leaving-clients" onclick="showLeavingClientsModal()"><div class="summary-icon"><i class="bi bi-person-dash"></i></div><div class="summary-label">Уходящие</div><div class="summary-value" id="sum_leaving">${prevLeaving} чел.</div></div>
            </div>
            <div class="chart-block"><div class="chart-header"><div class="chart-title"><i class="bi bi-pie-chart"></i> Продажи по категориям</div><div class="chart-switch"><button class="switch-btn ${ccm==='sum'?'active':''}" onclick="setCategoryMode('sum')">Сумма</button><button class="switch-btn ${ccm==='count'?'active':''}" onclick="setCategoryMode('count')">Кол-во</button></div></div><div class="category-chart">${cd.map(d=>`<div class="category-column cat-${d.category}"><div class="category-value">${fn(d.value)}${ccm==='sum'?'₽':' шт.'}</div><div class="category-fill-wrap"><div class="category-fill-inner animate" style="--target-height:${mc>0?(d.value/mc*100):0}%;" data-target="${mc>0?(d.value/mc*100):0}"></div></div><div class="category-label">${d.name}</div></div>`).join('')}</div></div>
            ${sd?`<div class="chart-block"><div class="chart-header"><div class="chart-title"><i class="bi bi-graph-up"></i> ${dailyTitle}</div></div>${dd.length?`<div class="bar-chart">${dd.map(d=>`<div class="bar-column"><div class="bar-value">${fn(d.value)}₽</div><div class="bar-fill-wrap"><div class="bar-fill-inner animate" style="--target-height:${md>0?(d.value/md*100):0}%;" data-target="${md>0?(d.value/md*100):0}"></div></div><div class="bar-label">${d.label}</div></div>`).join('')}</div>`:'<p class="text-muted text-center py-3">Нет данных</p>'}</div>`:''}
            ${period==='custom'?`<div class="date-range"><input type="date" class="date-input" id="startDate" value="${csd||''}" onchange="updateCustomDates()"><span class="date-separator">—</span><input type="date" class="date-input" id="endDate" value="${ced||''}" onchange="updateCustomDates()"></div>`:''}`;

            setTimeout(()=>{
                const revEl=document.getElementById('stat_revenue'),profEl=document.getElementById('stat_profit'),cntEl=document.getElementById('stat_count');
                const bookEl=document.getElementById('sum_booking'),debtEl=document.getElementById('sum_debt'),newEl=document.getElementById('sum_new'),leavingEl=document.getElementById('sum_leaving');
                if(revEl)animateValue(revEl,prevRev,rev,600,'₽');
                if(profEl)animateValue(profEl,prevProf,prof,600,'₽');
                if(cntEl)animateValue(cntEl,prevCnt,cnt,600,'');
                if(bookEl)animateValue(bookEl,prevBooking,bookingSum,600,'₽');
                if(debtEl)animateValue(debtEl,prevDebt,debtSum,600,'₽');
                if(newEl)animateValue(newEl,prevNew,newClients,600,' чел.');
                if(leavingEl)animateValue(leavingEl,prevLeaving,leavingClients,600,' чел.');
                setTimeout(()=>{

        function groupProductsNested(products, groupBy) {
            if (groupBy.length === 0) return { _root: products };
            const root = {};
            products.forEach(p => {
                let current = root;
                for (let i = 0; i < groupBy.length; i++) {
                    const field = groupBy[i];
                    const key = norm(p[field]);
                    if (!current[key]) current[key] = i === groupBy.length - 1 ? [] : {};
                    if (i === groupBy.length - 1) { current[key].push(p); }
                    else { current = current[key]; }
                }
            });
            return root;
        }

        function getGroupId(cat,level,keys){return['grp',cat,...keys.slice(0,level+1)].join('_');}

        function buildAccordionHTML(groups, groupBy, level, cat, parentKeys) {

            const entries = Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0]));
            const isLastLevel = (level + 1 >= groupBy.length);
            entries.forEach(([key, value]) => {
                const currentLevelKeys = [...parentKeys, key];
                const gid = getGroupId(cat, level, currentLevelKeys);
                const items = isLastLevel ? value : [];
                const firstItem = isLastLevel ? value[0] : Object.values(value)[0]?.[0];
                const fieldName = groupBy[level];
                const label = firstItem ? firstItem[fieldName] : key;
                const tab = level > 0 ? '&emsp;&emsp;' : '';
                const ks = currentLevelKeys.join('|||');
                const eb = isLastLevel ? `<button class="group-edit-btn" data-cat="${cat}" data-keys="${ks}" title="Изменить цены"><i class="bi bi-tags"></i></button>` : '';
                h += `<div class="accordion-group"><div class="accordion-header" id="hdr_${gid}"><span class="accordion-header-left" onclick="window.toggleAcc('${gid}')">${tab}${label}</span><div class="accordion-header-actions">${eb}<i class="bi bi-chevron-down accordion-arrow" onclick="window.toggleAcc('${gid}')"></i></div></div><div class="accordion-body" id="${gid}">`;
                if (!isLastLevel) {
                    h += buildAccordionHTML(value, groupBy, level + 1, cat, currentLevelKeys);
                } else {
                    const cols = CATEGORY_TABLE_COLS[cwc];
                    h += `<div class="table-header-row"><div class="product-col checkbox-col"></div>${cols.map(col => `<div class="product-col${col==='quantity'?' qty':(col==='purchase'||col==='selling'?' price':'')}">${COL_LABELS[col]}</div>`).join('')}<div class="product-col copy-btn"></div></div>`;

        function restoreOpenGroups(){og.forEach(gid=>{const b=document.getElementById(gid);if(b){b.classList.add('open');const hdr=document.getElementById('hdr_'+gid);if(hdr)hdr.classList.add('open');}});}

        // ИСПРАВЛЕНО: раздельная логика долгого нажатия и свайпа
        function setupWarehouseLongPress(row) {
            const wrapper = row.parentElement;
            let pressStartTime = 0;
            let animationFrame = null;
            let isPressing = false;
            let touchStartX = 0;
            let touchStartY = 0;
            let hasMoved = false;

            function updateBrightness() {
                if (!isPressing) return;
                const elapsed = Date.now() - pressStartTime;
                const progress = Math.min(elapsed / LONG_PRESS_DURATION, 1);
                // Плавно от 1.0 до 1.1 (10% светлее) за 1.3 секунды
                const brightness = 1.0 + (progress * 0.1);
                row.style.filter = `brightness(${brightness})`;
                
                if (progress < 1) {
                    animationFrame = requestAnimationFrame(updateBrightness);
                } else {
                    // Достигли порога — вход в режим выделения
                    row.style.filter = 'brightness(1.0)';
                    row.classList.remove('pressing');
                    vibrate(20);
                    if (!selectMode) {
                        enterSelectMode();
                        const pid = parseInt(row.dataset.pid);
                        toggleSelectProduct(pid);
                    }
                    isPressing = false;
                }
            }

            function startPress(e) {
                if (selectMode) return;
                if (e.target.closest('.copy-btn') || e.target.closest('.group-edit-btn') || e.target.closest('.select-checkbox')) return;
                
                // Запоминаем начальные координаты
                if (e.touches) {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                } else {
                    touchStartX = e.clientX;
                    touchStartY = e.clientY;
                }
                
                pressStartTime = Date.now();
                isPressing = true;
                hasMoved = false;
                row.classList.add('pressing');
                row.style.filter = 'brightness(1.0)';
                animationFrame = requestAnimationFrame(updateBrightness);
            }

            function endPress(e) {
                if (!isPressing) return;
                isPressing = false;
                if (animationFrame) cancelAnimationFrame(animationFrame);
                
                // Плавно возвращаем яркость
                row.style.transition = 'filter 0.25s ease';
                row.style.filter = 'brightness(1.0)';
                row.classList.remove('pressing');
                
                // Сбрасываем transition после анимации
                setTimeout(() => { row.style.transition = ''; }, 300);
            }

            function checkMove(e) {
                if (!isPressing) return;
                let currentX, currentY;
                if (e.touches) {
                    currentX = e.touches[0].clientX;
                    currentY = e.touches[0].clientY;
                } else {
                    currentX = e.clientX;
                    currentY = e.clientY;
                }
                const dx = Math.abs(currentX - touchStartX);
                const dy = Math.abs(currentY - touchStartY);
                // Если движение больше порога — отменяем долгое нажатие
                if (dx > SWIPE_MOVE_THRESHOLD || dy > SWIPE_MOVE_THRESHOLD) {
                    endPress(e);
                    hasMoved = true;
                }
            }

            // Мышиные события
            row.addEventListener('mousedown', startPress);
            row.addEventListener('mouseup', endPress);
            row.addEventListener('mouseleave', endPress);
            row.addEventListener('mousemove', checkMove);
            
            // Тач-события
            row.addEventListener('touchstart', startPress, {passive: true});
            row.addEventListener('touchend', endPress);
            row.addEventListener('touchcancel', endPress);
            row.addEventListener('touchmove', checkMove, {passive: true});
        }

        function setupWarehouseSwipe() {
            document.querySelectorAll('.product-row').forEach(row => {
                setupWarehouseLongPress(row);
                
                let sx = 0, sy = 0, sw = false;
                const w = row.parentElement, bg = w.querySelector('.swipe-delete-bg');
                const deleteIcon = w.querySelector('.swipe-delete-icon');
                
                row.addEventListener('touchstart', e => {
                    sx = e.touches[0].clientX;
                    sy = e.touches[0].clientY;
                    sw = false;
                }, {passive: false});
                
                row.addEventListener('touchmove', e => {
                    const dx = e.touches[0].clientX - sx;
                    const dy = e.touches[0].clientY - sy;
                    if (Math.abs(dx) > Math.abs(dy) && dx < 0 && !selectMode) {
                        e.preventDefault();
                        sw = true;
                        const maxSwipe = w.offsetWidth * 0.5;
                        const swipeDistance = Math.max(-maxSwipe, dx);
                        row.style.transition = 'none';
                        row.style.transform = `translateX(${swipeDistance}px)`;
                        if (bg) bg.style.opacity = Math.min(1, Math.abs(dx) / maxSwipe);
                        // Показываем иконку корзины при достаточном свайпе
                        if (deleteIcon) deleteIcon.style.opacity = Math.min(1, Math.abs(dx) / (maxSwipe * 0.6));
                    }
                }, {passive: false});
                
                row.addEventListener('touchend', async e => {
                    if (sw && !selectMode) {
                        const dx = (e.changedTouches[0]?.clientX || sx) - sx;
                        if (Math.abs(dx) > w.offsetWidth * 0.5) {
                            vibrate([15, 30, 15]);
                            const pid = parseInt(row.dataset.pid);
                            const p = await db.g('products', pid);
                            if (p) { deletedProducts = [p]; await db.del('products', pid); }
                            await renderWarehouseTable(cwc, document.querySelector('.search-input')?.value || '');
                            showSnackbar('Товар удалён', async () => {
                                for (const pp of deletedProducts) {
                                    const cp = {...pp}; delete cp.id;
                                    await db.add('products', cp);
                                }
                                await renderWarehouseTable(cwc, document.querySelector('.search-input')?.value || '');
                                deletedProducts = [];
                            });
                        } else {
                            row.style.transition = 'transform 0.2s ease';
                            row.style.transform = 'translateX(0)';
                            if (bg) bg.style.opacity = '0';
                            if (deleteIcon) deleteIcon.style.opacity = '0';
                        }
                    }
                    sw = false;
                });
                
                row.addEventListener('click', e => {
                    if (selectMode && !e.target.classList.contains('select-checkbox') && !e.target.closest('.copy-btn')) {
                        const pid = parseInt(row.dataset.pid);
                        toggleSelectProduct(pid);
                    }
                });
            });
        }

        function setupSalesLongPress(row) {
            let pressStartTime = 0, animationFrame = null, isPressing = false;
            let touchStartX = 0, touchStartY = 0;

            function updateBrightness() {
                if (!isPressing) return;
                const elapsed = Date.now() - pressStartTime;
                const progress = Math.min(elapsed / LONG_PRESS_DURATION, 1);
                const brightness = 1.0 + (progress * 0.1);
                row.style.filter = `brightness(${brightness})`;
                if (progress < 1) {
                    animationFrame = requestAnimationFrame(updateBrightness);
                } else {
                    row.style.filter = 'brightness(1.0)';
                    row.classList.remove('pressing');
                    vibrate(20);
                    if (!salesSelectMode) {
                        enterSalesSelectMode();
                        toggleSalesSelect(parseInt(row.dataset.sid));
                    }
                    isPressing = false;
                }
            }

            function startPress(e) {
                if (salesSelectMode) return;
                if (e.touches) { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }
                else { touchStartX = e.clientX; touchStartY = e.clientY; }
                pressStartTime = Date.now();
                isPressing = true;
                row.classList.add('pressing');
                row.style.filter = 'brightness(1.0)';
                animationFrame = requestAnimationFrame(updateBrightness);
            }

            function endPress(e) {
                if (!isPressing) return;
                isPressing = false;
                if (animationFrame) cancelAnimationFrame(animationFrame);
                row.style.transition = 'filter 0.25s ease';
                row.style.filter = 'brightness(1.0)';
                row.classList.remove('pressing');
                setTimeout(() => { row.style.transition = ''; }, 300);
            }

            function checkMove(e) {
                if (!isPressing) return;
                let cx, cy;
                if (e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
                else { cx = e.clientX; cy = e.clientY; }
                if (Math.abs(cx - touchStartX) > SWIPE_MOVE_THRESHOLD || Math.abs(cy - touchStartY) > SWIPE_MOVE_THRESHOLD) {
                    endPress(e);
                }
            }

            row.addEventListener('mousedown', startPress);
            row.addEventListener('mouseup', endPress);
            row.addEventListener('mouseleave', endPress);
            row.addEventListener('mousemove', checkMove);
            row.addEventListener('touchstart', startPress, {passive: true});
            row.addEventListener('touchend', endPress);
            row.addEventListener('touchcancel', endPress);
            row.addEventListener('touchmove', checkMove, {passive: true});
        }

        function getLiquidCount(clientSales){let count=0;const sorted=[...clientSales].sort((a,b)=>a.date.localeCompare(b.date));for(const s of sorted){if(s.note==='приз'){count=0;continue;}if(s.category==='liquid')count++;if(count>=9)count=9;}return count;}
        async function getClientStats(){const clients=await db.all('clients');const sales=await db.all('sales');const stats=[];for(const c of clients){const clientSales=sales.filter(s=>norm(s.client)===norm(c.name));clientSales.sort((a,b)=>b.date.localeCompare(a.date));const totalSum=clientSales.reduce((s,x)=>s+(x.total||0),0);const lastSale=clientSales[0]||null;const firstSale=clientSales[clientSales.length-1]||null;const liquidCount=getLiquidCount(clientSales);stats.push({id:c.id,name:c.name,created:c.created||(firstSale?firstSale.date:'-'),count:clientSales.length,lastDate:lastSale?lastSale.date:'-',totalSum:totalSum,liquidCount:liquidCount,leaving:isLeaving(lastSale?lastSale.date:null)});}stats.sort((a,b)=>b.lastDate.localeCompare(a.lastDate));return stats;}
        async function renderClientsTable(){let stats=await getClientStats();if(clientsSearch){const q=clientsSearch.toLowerCase();stats=stats.filter(s=>s.name.toLowerCase().includes(q));}if(clientsFilter==='leaving'){stats=stats.filter(s=>s.leaving);}const totalPages=Math.ceil(stats.length/PAGE_SIZE)||1;if(clientsPage>totalPages)clientsPage=totalPages;const start=(clientsPage-1)*PAGE_SIZE;const pageStats=stats.slice(start,start+PAGE_SIZE);let paginationHTML='';if(totalPages>1){paginationHTML=`<div class="pagination"><button onclick="goToClientsPage(${clientsPage-1})" ${clientsPage<=1?'disabled':''}><i class="bi bi-chevron-left"></i></button>`;for(let i=1;i<=totalPages;i++){if(i===1||i===totalPages||(i>=clientsPage-1&&i<=clientsPage+1)){paginationHTML+=`<button class="${i===clientsPage?'active':''}" onclick="goToClientsPage(${i})">${i}</button>`;}else if(i===clientsPage-2||i===clientsPage+2){paginationHTML+=`<span class="page-info">...</span>`;}}paginationHTML+=`<button onclick="goToClientsPage(${clientsPage+1})" ${clientsPage>=totalPages?'disabled':''}><i class="bi bi-chevron-right"></i></button><span class="page-info">${clientsPage}/${totalPages}</span></div>`;}const leavingBtnClass=clientsFilter==='leaving'?'active':'filter';document.getElementById('contentBody').innerHTML=`<h2 class="tab-title" onclick="openSidebar()">Клиенты</h2><div class="clients-header"><div class="clients-header-left"><button class="sales-header-btn ${leavingBtnClass}" onclick="toggleClientsFilter()"><i class="bi bi-person-dash"></i> Уходящие</button></div><button class="sales-header-btn" onclick="showAddClientModal()"><i class="bi bi-plus-lg"></i> Клиент</button></div><input type="text" class="search-input" placeholder="Поиск по имени..." value="${clientsSearch}" oninput="onClientsSearch(this.value)"><div class="clients-table-section"><div class="client-table-header"><div class="client-col">Имя</div><div class="client-col">Дата</div><div class="client-col prize-progress">До приза</div><div class="client-col">Последняя покупка</div><div class="client-col price">Общая сумма</div></div>${pageStats.length===0?'<p class="text-center text-muted py-4">Нет клиентов</p>':pageStats.map(s=>{const barWidth=(s.liquidCount/9*100);const prizeText=s.liquidCount>=9?'<span class="prize-complete">🎁</span>':`${s.liquidCount}/9`;return`<div class="client-row ${s.leaving?'leaving':''}" onclick="showClientModal(${s.id},'${s.name.replace(/'/g,"\\'")}')"><div class="client-col">${s.name}</div><div class="client-col">${fmtDate(s.created)}</div><div class="client-col prize-progress"><span class="prize-bar"><span class="prize-bar-fill" style="width:${barWidth}%;"></span></span><span class="prize-text">${prizeText}</span></div><div class="client-col">${fmtDate(s.lastDate)}</div><div class="client-col price">${fn(s.totalSum)}₽</div></div>`;}).join('')}${paginationHTML}</div>`;}
        function toggleClientsFilter(){clientsFilter=clientsFilter==='leaving'?'all':'leaving';clientsPage=1;renderClientsTable();}
        function onClientsSearch(v){clientsSearch=v;clientsPage=1;renderClientsTable();}
        function goToClientsPage(p){clientsPage=p;renderClientsTable();}
        function showAddClientModal(){showModal('Добавить клиента','bi bi-person-plus','var(--accent)',`<div class="form-group"><label class="form-label">Имя клиента</label><input type="text" class="form-input" id="new_client_name" placeholder="Имя"></div>`,`<button class="btn btn-cancel" onclick="closeModal()">Отменить</button><button class="btn btn-save" onclick="addClient()">Добавить</button>`);}
        async function addClient(){const name=document.getElementById('new_client_name').value.trim();if(!name){alert('Введите имя');return;}await db.add('clients',{name:name,created:new Date().toISOString().split('T')[0]});closeModal();clientsPage=1;await renderClientsTable();}
        let clientModalPage=1;
        async function showClientModal(clientId,clientName){clientModalPage=1;const sales=await db.all('sales');const clientSales=sales.filter(s=>norm(s.client)===norm(clientName));clientSales.sort((a,b)=>b.date.localeCompare(a.date));renderClientModal(clientId,clientName,clientSales);}
        function renderClientModal(clientId,clientName,clientSales){const totalPages=Math.ceil(clientSales.length/5)||1;if(clientModalPage>totalPages)clientModalPage=totalPages;const start=(clientModalPage-1)*5;const pageSales=clientSales.slice(start,start+5);let paginationHTML='';if(totalPages>1){paginationHTML=`<div class="pagination"><button onclick="clientModalGoToPage(${clientModalPage-1},${clientId},'${clientName.replace(/'/g,"\\'")}')" ${clientModalPage<=1?'disabled':''}><i class="bi bi-chevron-left"></i></button><span class="page-info">${clientModalPage}/${totalPages}</span><button onclick="clientModalGoToPage(${clientModalPage+1},${clientId},'${clientName.replace(/'/g,"\\'")}')" ${clientModalPage>=totalPages?'disabled':''}><i class="bi bi-chevron-right"></i></button></div>`;}showModal(clientName,'bi bi-person','var(--accent)',`<div class="sale-table-header"><div class="sale-col">Товар</div><div class="sale-col qty">Кол-во</div><div class="sale-col price">Сумма</div><div class="sale-col">Дата</div><div class="sale-col">Заметка</div></div>${pageSales.length===0?'<p class="text-muted text-center py-3">Нет покупок</p>':pageSales.map(s=>`<div class="sale-row"><div class="sale-col">${s.product||'-'}</div><div class="sale-col qty">${s.quantity||0}</div><div class="sale-col price">${fn(s.total||0)}₽</div><div class="sale-col">${fmtDate(s.date)}</div><div class="sale-col">${s.note||'-'}</div></div>`).join('')}${paginationHTML}`,`<button class="btn btn-cancel" onclick="editClientName(${clientId},'${clientName.replace(/'/g,"\\'")}')"><i class="bi bi-pencil"></i> Имя</button><button class="btn btn-delete" onclick="deleteClient(${clientId},'${clientName.replace(/'/g,"\\'")}')"><i class="bi bi-trash"></i> Удалить</button>`);}
        function clientModalGoToPage(p,clientId,clientName){clientModalPage=p;const sales=db.all('sales').then(s=>{const cs=s.filter(x=>norm(x.client)===norm(clientName));cs.sort((a,b)=>b.date.localeCompare(a.date));renderClientModal(clientId,clientName,cs);});}
        function editClientName(clientId,oldName){showModal('Редактировать имя','bi bi-pencil','var(--accent)',`<div class="form-group"><label class="form-label">Новое имя</label><input type="text" class="form-input" id="edit_client_name" value="${oldName}"></div>`,`<button class="btn btn-cancel" onclick="closeModal()">Отмена</button><button class="btn btn-save" onclick="saveClientName(${clientId},'${oldName.replace(/'/g,"\\'")}')">Сохранить</button>`);}
        async function saveClientName(clientId,oldName){const newName=document.getElementById('edit_client_name').value.trim();if(!newName){alert('Введите имя');return;}const client=await db.g('clients',clientId);if(client){client.name=newName;await db.pu('clients',client);}const sales=await db.all('sales');for(const s of sales){if(norm(s.client)===norm(oldName)){s.client=newName;await db.pu('sales',s);}}closeModal();clientsPage=1;await renderClientsTable();}
        async function deleteClient(clientId,clientName){if(!confirm(`Удалить клиента "${clientName}"? Продажи останутся.`))return;await db.del('clients',clientId);closeModal();clientsPage=1;await renderClientsTable();}

        // ============ ВКЛАДКИ ============
        async function switchTab(tab){
            document.querySelectorAll('.nav-item').forEach(i=>i.classList.toggle('active',i.dataset.tab===tab));
            const body=document.getElementById('contentBody');
            const tabNames = {'statistics':'statistics','warehouse':'warehouse','sales':'sales','clients':'clients'};
            const skeletonType = tabNames[tab] || 'sales';
            body.innerHTML = showSkeleton(skeletonType);
            body.classList.remove('fade-in');
            
            setTimeout(async()=>{
                if(tab==='statistics')await renderStatistics(cp);
                else if(tab==='warehouse')await renderWarehouseCards();
                else if(tab==='sales')await renderSalesTable();
                else if(tab==='clients')await renderClientsTable();
                else body.innerHTML=`<h2 class="tab-title" onclick="openSidebar()">Вкладка</h2><p class="text-center text-muted py-5">Вкладка пока пустая</p>`;
                // Fade in после загрузки
                body.classList.add('fade-in');
            },250);
            closeSidebar();
        }

        async function init(){try{await db.init();await loadTheme();await renderSalesTable();if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');}catch(e){console.error(e);}}
        document.addEventListener('DOMContentLoaded',init);
    </script>
</body>
</html>
