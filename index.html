<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#81D8D0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Crazy Rabbit</title>
    
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="styles.css" rel="stylesheet">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <!-- Кнопка меню -->
    <button id="menuToggle" class="menu-toggle-btn">
        <i class="bi bi-list"></i>
    </button>

    <!-- Сайдбар (overlay) -->
    <div id="sidebar" class="sidebar-overlay">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <h3 class="mb-0">Crazy Rabbit</h3>
                <button id="closeSidebar" class="btn-close-custom">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-tab="statistics">
                    <i class="bi bi-graph-up-arrow"></i>
                    <span>Статистика</span>
                </a>
                <a href="#" class="nav-item" data-tab="warehouse">
                    <i class="bi bi-box-seam"></i>
                    <span>Склад</span>
                </a>
                <a href="#" class="nav-item" data-tab="sales">
                    <i class="bi bi-cart3"></i>
                    <span>Продажи</span>
                </a>
                <a href="#" class="nav-item" data-tab="clients">
                    <i class="bi bi-people"></i>
                    <span>Клиенты</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <!-- Селектор тем -->
                <div class="theme-selector">
                    <label class="theme-label">
                        <i class="bi bi-palette"></i> Тема оформления
                    </label>
                    <div class="theme-buttons">
                        <button class="theme-btn active" data-theme="dark">
                            <i class="bi bi-moon-stars"></i>
                            <span>Тёмная</span>
                        </button>
                        <button class="theme-btn" data-theme="light">
                            <i class="bi bi-sun"></i>
                            <span>Светлая</span>
                        </button>
                        <button class="theme-btn" data-theme="pink">
                            <i class="bi bi-heart"></i>
                            <span>Девчачья</span>
                        </button>
                    </div>
                </div>
                
                <!-- Установка PWA -->
                <button id="installBtn" class="install-btn" style="display: none;">
                    <i class="bi bi-download"></i>
                    Установить приложение
                </button>
            </div>
        </div>
    </div>

    <!-- Основной контент -->
    <main id="mainContent" class="main-content">
        <header class="content-header">
            <h2 id="currentTabTitle" class="tab-title">Статистика</h2>
        </header>
        
        <div class="content-body" id="contentBody">
            <!-- Контент вкладок будет здесь -->
        </div>
    </main>

    <!-- Модальное окно -->
    <div class="modal fade" id="exampleModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Модальное окно</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Здесь будет содержимое модального окна.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                    <button type="button" class="btn btn-primary">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Application JS -->
    <script src="app.js"></script>
</body>
  </html>
